<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Anxious Attachment Companion — Calm Relationship Anxiety</title>

  <style>
    :root{
      --bg:#070a0f;
      --panel:#0b0f16;
      --panel2:#0e1420;
      --text:#e9eef7;
      --muted:#a9b5c8;

      /* Logo-inspired gradient */
      --g1:#73F0E8; /* teal */
      --g2:#5AA9FF; /* blue */
      --g3:#B87CFF; /* purple */
      --g4:#FF7AD9; /* subtle pink accent (optional) */

      --line: rgba(255,255,255,.10);
      --shadow: 0 20px 60px rgba(0,0,0,.55);
      --radius: 22px;
      --radius2: 16px;

      --max: 1120px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(900px 420px at 18% 12%, rgba(115,240,232,.18), transparent 60%),
        radial-gradient(900px 420px at 82% 20%, rgba(184,124,255,.18), transparent 62%),
        radial-gradient(720px 420px at 55% 85%, rgba(90,169,255,.12), transparent 62%),
        linear-gradient(180deg, #05070b 0%, var(--bg) 55%, #05070b 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    .wrap{ max-width:var(--max); margin:0 auto; padding:0 18px; }

    /* Top bar */
    header{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter: blur(14px);
      background: rgba(7,10,15,.55);
      border-bottom: 1px solid var(--line);
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 0;
      gap:14px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:240px;
    }
    .logo{
      width:40px; height:40px;
      border-radius:12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.55);
      object-fit:cover;
      border: 1px solid rgba(255,255,255,.12);
      background:#0b0f16;
    }
    .brand strong{ font-size:14px; letter-spacing:.2px; }
    .brand span{ display:block; font-size:12px; color:var(--muted); margin-top:2px; }

    nav{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .navlink{
      font-size:13px;
      color:var(--muted);
      padding:8px 10px;
      border-radius:12px;
      border:1px solid transparent;
    }
    .navlink:hover{
      color:var(--text);
      border-color: rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }

    /* Buttons */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:11px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color:var(--text);
      font-weight:600;
      font-size:13px;
      letter-spacing:.2px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      transition: transform .12s ease, background .12s ease, border-color .12s ease, filter .12s ease;
      user-select:none;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.20); }
    .btn:active{ transform: translateY(0px) scale(.99); }

    .btn-primary{
      border: none;
      background: linear-gradient(90deg, var(--g1), var(--g2), var(--g3));
      color:#061018;
      box-shadow: 0 18px 55px rgba(90,169,255,.18);
    }
    .btn-primary:hover{ filter: brightness(1.03); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color:var(--muted);
      font-size:12px;
    }
    .dot{
      width:8px; height:8px; border-radius:50%;
      background: linear-gradient(90deg, var(--g1), var(--g2), var(--g3));
      box-shadow: 0 0 0 4px rgba(90,169,255,.10);
    }

    /* Hero */
    .hero{
      padding:56px 0 18px;
      position:relative;
    }
    .grid{
      display:grid;
